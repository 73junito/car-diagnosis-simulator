name: Auth-aware API Smoke Test

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  smoke:
    name: Run smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: torquemind-api
        run: npm ci

      - name: Start API server
        working-directory: torquemind-api
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          nohup npm start >/tmp/torquemind.log 2>&1 &
          echo "Server starting..."

      - name: Wait for API
        working-directory: torquemind-api
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:3000/ >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/torquemind.log || true
          exit 1

      - name: Show API startup log
        run: |
          echo "----- API LOG -----"
          cat /tmp/torquemind.log || true
          echo "-------------------"

      - name: Run auth-aware smoke test
        working-directory: torquemind-api
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_TEACHER_EMAIL: ${{ secrets.TEST_TEACHER_EMAIL }}
          TEST_TEACHER_PASSWORD: ${{ secrets.TEST_TEACHER_PASSWORD }}
          BASE_URL: http://localhost:3000
        run: npm run test:smoke
